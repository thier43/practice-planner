<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salle de Travail — Planning de pratique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B1E23;
    --surface:#242830;
    --surface-2:#2C313B;
    --border:#3A404B;
    --text:#EDEAE3;
    --text-muted:#9AA0AC;
    --irish:#7FA06F;
    --irish-soft:rgba(127,160,111,.16);
    --jazz:#C99A4B;
    --jazz-soft:rgba(201,154,75,.16);
    --mixte:#8C8FA3;
    --mixte-soft:rgba(140,143,163,.16);
    --danger:#C1666B;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--ink);color:var(--text);font-family:'Inter',sans-serif;}
  h1,h2,h3,.display{font-family:'Fraunces',serif;font-weight:600;}
  .mono{font-family:'JetBrains Mono',monospace;}

  #config-banner{
    display:none;background:var(--jazz-soft);border-bottom:1px solid var(--jazz);
    color:var(--text);padding:10px 20px;font-size:13px;text-align:center;
  }
  #config-banner code{background:rgba(0,0,0,.25);padding:2px 6px;border-radius:4px;}

  header{
    padding:22px 28px 14px;border-bottom:1px solid var(--border);
    display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:10px;
  }
  header h1{font-size:26px;font-style:italic;margin:0;letter-spacing:.2px;}
  header p{margin:2px 0 0;color:var(--text-muted);font-size:13px;}

  .toolbar{
    display:flex;align-items:center;gap:10px;padding:16px 28px;flex-wrap:wrap;
    border-bottom:1px solid var(--border);
  }
  .seg{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .seg button{
    background:none;border:none;color:var(--text-muted);padding:7px 14px;font-size:13px;
    cursor:pointer;font-family:inherit;
  }
  .seg button.active{background:var(--surface-2);color:var(--text);}
  .chip{
    padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface);
    color:var(--text-muted);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;
  }
  .chip.active-all{color:var(--text);border-color:var(--text-muted);}
  .chip.active-irish{color:var(--irish);border-color:var(--irish);background:var(--irish-soft);}
  .chip.active-jazz{color:var(--jazz);border-color:var(--jazz);background:var(--jazz-soft);}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .dot.irish{background:var(--irish);}
  .dot.jazz{background:var(--jazz);}
  .dot.mixte{background:var(--mixte);}

  .spacer{flex:1;}
  .btn{
    background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;
    display:flex;align-items:center;gap:6px;
  }
  .btn:hover{border-color:var(--text-muted);}
  .btn.primary{background:var(--irish);color:#12160f;border-color:var(--irish);font-weight:600;}
  .btn.ghost{background:none;}
  .nav-arrows button{
    background:none;border:1px solid var(--border);color:var(--text);width:30px;height:30px;
    border-radius:7px;cursor:pointer;font-size:14px;
  }
  #nav-today{
    width:auto;height:30px;padding:0 14px;background:var(--surface-2);white-space:nowrap;
  }
  #period-label{font-size:14px;color:var(--text-muted);min-width:170px;text-align:center;}

  .stats-bar{display:flex;gap:14px;padding:0 28px 16px;flex-wrap:wrap;}
  .stat-card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:10px 16px;min-width:140px;
  }
  .stat-card .label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;}
  .stat-card .value{font-size:20px;font-weight:600;margin-top:2px;}
  .stat-card.irish .value{color:var(--irish);}
  .stat-card.jazz .value{color:var(--jazz);}

  main{padding:10px 28px 60px;}

  /* Month view */
  #month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .mg-dayname{color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:4px 8px;}
  .mg-cell{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    min-height:90px;padding:8px;cursor:pointer;position:relative;
  }
  .mg-cell.other-month{opacity:.35;}
  .mg-cell.today{border-color:var(--jazz);}
  .mg-cell .num{font-size:13px;color:var(--text-muted);}
  .mg-cell .dots{position:absolute;bottom:8px;left:8px;display:flex;gap:4px;}
  .mg-cell .mins{position:absolute;bottom:8px;right:8px;font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;}

  /* Week / Day view */
  .cal-wrap{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--surface);}
  .hours-col{width:56px;flex-shrink:0;border-right:1px solid var(--border);}
  .hour-label{height:60px;font-size:11px;color:var(--text-muted);text-align:right;padding-right:8px;
    font-family:'JetBrains Mono',monospace;transform:translateY(-7px);}
  .day-col{flex:1;position:relative;border-right:1px solid var(--border);min-width:0;}
  .day-col:last-child{border-right:none;}
  .day-header{
    height:44px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;
    align-items:center;justify-content:center;font-size:12px;color:var(--text-muted);
  }
  .day-header .d{font-size:15px;color:var(--text);font-weight:600;}
  .day-header.today{background:rgba(201,154,75,.10);}
  .day-body{position:relative;background-image:repeating-linear-gradient(to bottom,var(--border) 0,var(--border) 1px,transparent 1px,transparent 60px);}
  .day-body .staff{position:absolute;left:0;right:0;height:60px;}
  .slot-hit{position:absolute;left:0;right:0;height:60px;cursor:pointer;}
  .slot-hit:hover{background:rgba(255,255,255,.03);}

  .session-block{
    position:absolute;left:3px;right:3px;border-radius:7px;padding:4px 7px;font-size:11.5px;
    overflow:hidden;cursor:pointer;border:1px solid transparent;line-height:1.3;
  }
  .session-block.irish{background:var(--irish-soft);border-color:var(--irish);color:var(--irish);}
  .session-block.jazz{background:var(--jazz-soft);border-color:var(--jazz);color:var(--jazz);}
  .session-block.mixte{background:var(--mixte-soft);border-color:var(--mixte);color:var(--mixte);}
  .session-block.done{opacity:.45;text-decoration:line-through;}
  .session-block .t{font-family:'JetBrains Mono',monospace;font-size:10px;opacity:.85;}
  .session-block .title-line{color:var(--text);font-weight:500;}

  /* Modals */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;
    z-index:200;padding:20px;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:480px;
    max-height:88vh;overflow-y:auto;padding:22px;
  }
  .modal h2{margin:0 0 14px;font-size:19px;font-style:italic;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:5px;}
  .field input[type=text], .field input[type=date], .field input[type=time], .field input[type=number],
  .field select, .field textarea{
    width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    padding:8px 10px;border-radius:7px;font-size:13px;font-family:inherit;
  }
  .field textarea{min-height:60px;resize:vertical;}
  .row2{display:flex;gap:10px;}
  .row2 .field{flex:1;}
  .item-pick{max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:6px;}
  .item-pick label{display:flex;align-items:center;gap:8px;padding:5px 6px;font-size:13px;color:var(--text);cursor:pointer;border-radius:6px;}
  .item-pick label:hover{background:var(--surface-2);}
  .item-pick .badge{font-size:10px;color:var(--text-muted);margin-left:auto;font-family:'JetBrains Mono',monospace;}
  .modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:space-between;}
  .modal-actions .right{display:flex;gap:8px;}

  /* Library modal */
  #library-modal .modal{max-width:640px;}
  .lib-tabs{display:flex;gap:8px;margin-bottom:14px;}
  .lib-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;max-height:320px;overflow-y:auto;}
  .lib-row{
    display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--border);
    border-radius:8px;padding:8px 10px;
  }
  .lib-row .ttl{flex:1;font-size:13px;}
  .lib-row .meta{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;}
  .lib-row .status{font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,.06);color:var(--text-muted);}
  .lib-row .res-btn{
    background:none;border:1px solid var(--border);color:var(--text-muted);cursor:pointer;
    font-size:11px;padding:3px 8px;border-radius:6px;text-decoration:none;white-space:nowrap;
  }
  .lib-row .res-btn:hover{color:var(--text);border-color:var(--text-muted);}
  .icon-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:4px;}
  .icon-btn:hover{color:var(--text);}
  .icon-btn.del:hover{color:var(--danger);}

  .empty-note{color:var(--text-muted);font-size:12px;text-align:center;padding:14px;}
  @media (max-width:760px){
    .hours-col{width:38px;}
    header, .toolbar, .stats-bar, main{padding-left:14px;padding-right:14px;}
    .day-header .d{font-size:13px;}
  }
</style>
</head>
<body>

<div id="config-banner"></div>

<header>
  <div>
    <h1>Salle de Travail</h1>
    <p>Planning de pratique — Sky Road &amp; AMAJAZZ</p>
  </div>
  <button class="btn" id="btn-library">📚 Bibliothèque</button>
</header>

<div class="toolbar">
  <div class="seg" id="view-seg">
    <button data-view="month" class="active">Mois</button>
    <button data-view="week">Semaine</button>
    <button data-view="day">Jour</button>
  </div>

  <div class="nav-arrows" style="display:flex;gap:6px;">
    <button id="nav-prev">‹</button>
    <button id="nav-today" class="btn ghost" style="height:30px;">Aujourd'hui</button>
    <button id="nav-next">›</button>
  </div>
  <div id="period-label" class="mono"></div>

  <div class="spacer"></div>

  <div class="chip active-all" data-cat="all">Tout</div>
  <div class="chip" data-cat="irish"><span class="dot irish"></span>Irlandais</div>
  <div class="chip" data-cat="jazz"><span class="dot jazz"></span>Jazz</div>

  <button class="btn primary" id="btn-new-session">+ Séance</button>
</div>

<div class="stats-bar" id="stats-bar"></div>

<main>
  <div id="month-grid" style="display:none;"></div>
  <div class="cal-wrap" id="cal-wrap" style="display:none;">
    <div class="hours-col" id="hours-col"></div>
    <div id="days-container" style="display:flex;flex:1;"></div>
  </div>
</main>

<!-- Session modal -->
<div class="overlay" id="session-overlay">
  <div class="modal">
    <h2 id="session-modal-title">Nouvelle séance</h2>
    <input type="hidden" id="session-id">
    <div class="row2">
      <div class="field"><label>Date</label><input type="date" id="s-date"></div>
      <div class="field"><label>Heure de début</label><input type="time" id="s-time"></div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Durée</label>
        <select id="s-duration">
          <option value="15">15 min</option>
          <option value="30" selected>30 min</option>
          <option value="45">45 min</option>
          <option value="60">1 h</option>
          <option value="90">1 h 30</option>
          <option value="120">2 h</option>
        </select>
      </div>
      <div class="field">
        <label>Catégorie</label>
        <select id="s-category">
          <option value="irish">Irlandais</option>
          <option value="jazz">Jazz</option>
          <option value="mixte">Mixte</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Éléments travaillés</label>
      <div class="item-pick" id="s-items"></div>
    </div>
    <div class="field" id="s-resources-wrap" style="display:none;">
      <label>📂 Supports pour cette séance</label>
      <div id="s-resources" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
    </div>
    <div class="field"><label>Notes</label><textarea id="s-notes" placeholder="Points à travailler, tempo, ressenti..."></textarea></div>
    <div class="modal-actions">
      <div>
        <button class="btn ghost" id="s-delete" style="display:none;color:var(--danger);">Supprimer</button>
      </div>
      <div class="right">
        <button class="btn" id="s-toggle-done" style="display:none;">Marquer comme fait</button>
        <button class="btn ghost" id="s-cancel">Annuler</button>
        <button class="btn primary" id="s-save">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<!-- Library modal -->
<div class="overlay" id="library-modal">
  <div class="modal">
    <h2>Bibliothèque</h2>
    <div class="lib-tabs">
      <div class="chip active-irish" data-libcat="irish"><span class="dot irish"></span>Irlandais</div>
      <div class="chip" data-libcat="jazz"><span class="dot jazz"></span>Jazz</div>
    </div>
    <div class="lib-list" id="lib-list"></div>
    <h2 id="li-form-title" style="font-size:15px;margin-top:4px;">Ajouter un élément</h2>
    <div class="field"><label>Titre</label><input type="text" id="li-title" placeholder="Ex : The Kesh Jig, gamme bebop en Bb..."></div>
    <div class="row2">
      <div class="field">
        <label>Type</label>
        <select id="li-type">
          <option value="morceau">Morceau</option>
          <option value="etude">Étude</option>
          <option value="exercice">Exercice</option>
        </select>
      </div>
      <div class="field">
        <label>Statut</label>
        <select id="li-status">
          <option value="a_travailler">À travailler</option>
          <option value="en_cours">En cours</option>
          <option value="maitrise">Maîtrisé</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Notes</label><textarea id="li-desc" placeholder="Optionnel"></textarea></div>
    <div class="field">
      <label>Dossier / lien des supports (vidéo, audio, PDF...)</label>
      <input type="text" id="li-resource" placeholder="Ex : D:\Cours\Kesh Jig ou lien Drive/OneDrive">
    </div>
    <input type="hidden" id="li-id">
    <div class="modal-actions">
      <div>
        <button class="btn ghost" id="li-edit-cancel" style="display:none;">Annuler la modification</button>
      </div>
      <div class="right">
        <button class="btn ghost" id="li-cancel-close">Fermer</button>
        <button class="btn primary" id="li-add">Ajouter</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ---------- petit client pour les routes /api/* (Vercel + Turso) ---------- */
async function api(path, options){
  const res = await fetch(path, {
    headers: {'Content-Type':'application/json'},
    ...options
  });
  let data = null;
  try { data = await res.json(); } catch(e){ /* pas de corps JSON */ }
  if(!res.ok){
    const msg = (data && data.error) ? data.error : ('Erreur API ('+res.status+')');
    document.getElementById('config-banner').textContent = msg;
    document.getElementById('config-banner').style.display = 'block';
    throw new Error(msg);
  }
  return data;
}

const DAY_NAMES = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const MONTH_NAMES = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const HOUR_START = 7, HOUR_END = 23; // fenêtre de travail affichée
const TYPE_LABEL = {morceau:'Morceau', etude:'Étude', exercice:'Exercice'};
const STATUS_LABEL = {a_travailler:'À travailler', en_cours:'En cours', maitrise:'Maîtrisé'};

let state = {
  view: 'month',
  anchor: new Date(),
  catFilter: 'all',
  items: [],
  sessions: [],
  libCat: 'irish',
};

/* ---------- date helpers ---------- */
function iso(d){ return d.toISOString().slice(0,10); }
function stripTime(d){ const n = new Date(d); n.setHours(0,0,0,0); return n; }
function addDays(d,n){ const c = new Date(d); c.setDate(c.getDate()+n); return c; }
function addMonths(d,n){ const c = new Date(d); c.setMonth(c.getMonth()+n); return c; }
function startOfWeek(d){ const c = stripTime(d); const day = (c.getDay()+6)%7; return addDays(c,-day); }
function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function endOfMonth(d){ return new Date(d.getFullYear(), d.getMonth()+1, 0); }
function sameDay(a,b){ return iso(a)===iso(b); }
function minsLabel(m){ if(m<60) return m+' min'; const h=Math.floor(m/60), r=m%60; return r? h+'h'+String(r).padStart(2,'0') : h+'h'; }

/* ---------- data access ---------- */
async function fetchItems(){
  try{
    state.items = await api('/api/items') || [];
  } catch(e){ console.error(e); state.items = []; }
}

async function fetchSessions(rangeStart, rangeEnd){
  try{
    const params = new URLSearchParams({from: iso(rangeStart), to: iso(rangeEnd)});
    state.sessions = await api('/api/sessions?'+params.toString()) || [];
  } catch(e){ console.error(e); state.sessions = []; }
}

function visibleRange(){
  if(state.view==='month'){
    const s = startOfWeek(startOfMonth(state.anchor));
    const e = addDays(startOfWeek(endOfMonth(state.anchor)), 6);
    return [s,e];
  }
  if(state.view==='week'){
    const s = startOfWeek(state.anchor);
    return [s, addDays(s,6)];
  }
  const d = stripTime(state.anchor);
  return [d,d];
}

async function reload(){
  await fetchItems();
  const [s,e] = visibleRange();
  await fetchSessions(s,e);
  renderAll();
}

function sessionsForDay(d){
  return state.sessions.filter(s => s.session_date === iso(d) && (state.catFilter==='all' || s.category===state.catFilter || (state.catFilter!=='all' && s.category==='mixte')));
}

/* ---------- rendering: shell ---------- */
function renderAll(){
  renderPeriodLabel();
  renderStats();
  document.getElementById('month-grid').style.display = state.view==='month' ? 'grid' : 'none';
  document.getElementById('cal-wrap').style.display = state.view==='month' ? 'none' : 'flex';
  if(state.view==='month') renderMonth();
  else renderCalGrid();
}

function renderPeriodLabel(){
  const el = document.getElementById('period-label');
  if(state.view==='month'){
    el.textContent = MONTH_NAMES[state.anchor.getMonth()] + ' ' + state.anchor.getFullYear();
  } else if(state.view==='week'){
    const s = startOfWeek(state.anchor), e = addDays(s,6);
    el.textContent = s.getDate()+' '+MONTH_NAMES[s.getMonth()].slice(0,3)+' – '+e.getDate()+' '+MONTH_NAMES[e.getMonth()].slice(0,3);
  } else {
    el.textContent = DAY_NAMES[(state.anchor.getDay()+6)%7]+' '+state.anchor.getDate()+' '+MONTH_NAMES[state.anchor.getMonth()];
  }
}

function renderStats(){
  const [s,e] = visibleRange();
  let planned = {irish:0, jazz:0}, done = {irish:0, jazz:0};
  state.sessions.forEach(sess=>{
    const cats = sess.category==='mixte' ? ['irish','jazz'] : [sess.category];
    const share = sess.category==='mixte' ? sess.duration_minutes/2 : sess.duration_minutes;
    cats.forEach(c=>{
      planned[c]+=share;
      if(sess.done) done[c]+=share;
    });
  });
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = `
    <div class="stat-card irish"><div class="label">Irlandais planifié</div><div class="value">${minsLabel(Math.round(planned.irish))}</div></div>
    <div class="stat-card irish"><div class="label">Irlandais fait</div><div class="value">${minsLabel(Math.round(done.irish))}</div></div>
    <div class="stat-card jazz"><div class="label">Jazz planifié</div><div class="value">${minsLabel(Math.round(planned.jazz))}</div></div>
    <div class="stat-card jazz"><div class="label">Jazz fait</div><div class="value">${minsLabel(Math.round(done.jazz))}</div></div>
  `;
}

/* ---------- month view ---------- */
function renderMonth(){
  const grid = document.getElementById('month-grid');
  grid.innerHTML = '';
  DAY_NAMES.forEach(n=>{
    const d = document.createElement('div');
    d.className='mg-dayname'; d.textContent=n; grid.appendChild(d);
  });
  const start = startOfWeek(startOfMonth(state.anchor));
  const today = new Date();
  for(let i=0;i<42;i++){
    const day = addDays(start,i);
    const cell = document.createElement('div');
    cell.className = 'mg-cell' + (day.getMonth()!==state.anchor.getMonth()?' other-month':'') + (sameDay(day,today)?' today':'');
    const daySessions = sessionsForDay(day);
    const totalMin = daySessions.reduce((a,s)=>a+s.duration_minutes,0);
    const cats = [...new Set(daySessions.map(s=>s.category))];
    cell.innerHTML = `<div class="num">${day.getDate()}</div>
      <div class="dots">${cats.map(c=>`<span class="dot ${c}"></span>`).join('')}</div>
      ${totalMin?`<div class="mins">${minsLabel(totalMin)}</div>`:''}`;
    cell.onclick = ()=>{ state.anchor = day; state.view='day'; setActiveViewButton(); reload(); };
    grid.appendChild(cell);
  }
}

/* ---------- week/day grid ---------- */
function renderCalGrid(){
  const hoursCol = document.getElementById('hours-col');
  hoursCol.innerHTML = '<div style="height:44px;"></div>';
  for(let h=HOUR_START; h<HOUR_END; h++){
    const lab = document.createElement('div');
    lab.className='hour-label'; lab.textContent = String(h).padStart(2,'0')+':00';
    hoursCol.appendChild(lab);
  }
  const container = document.getElementById('days-container');
  container.innerHTML = '';
  const days = state.view==='week'
    ? Array.from({length:7}, (_,i)=>addDays(startOfWeek(state.anchor), i))
    : [stripTime(state.anchor)];
  const today = new Date();

  days.forEach(day=>{
    const col = document.createElement('div');
    col.className='day-col';
    const header = document.createElement('div');
    header.className='day-header'+(sameDay(day,today)?' today':'');
    header.innerHTML = `<div>${DAY_NAMES[(day.getDay()+6)%7]}</div><div class="d">${day.getDate()}</div>`;
    col.appendChild(header);

    const body = document.createElement('div');
    body.className='day-body';
    body.style.height = ((HOUR_END-HOUR_START)*60)+'px';

    for(let h=HOUR_START; h<HOUR_END; h++){
      const hit = document.createElement('div');
      hit.className='slot-hit';
      hit.style.top = ((h-HOUR_START)*60)+'px';
      hit.onclick = (e)=>{
        const rect = hit.getBoundingClientRect();
        const offsetY = e.clientY - rect.top;
        const minute = offsetY < 30 ? 0 : 30;
        openSessionModal(null, day, h, minute);
      };
      body.appendChild(hit);
    }

    sessionsForDay(day).forEach(sess=>{
      const [hh,mm] = sess.start_time.split(':').map(Number);
      const top = (hh - HOUR_START)*60 + mm;
      const height = Math.max(sess.duration_minutes, 22);
      const block = document.createElement('div');
      block.className = 'session-block '+sess.category+(sess.done?' done':'');
      block.style.top = top+'px';
      block.style.height = height+'px';
      const items = (sess.items||[]).map(it=>it.title).filter(Boolean);
      block.innerHTML = `<div class="t">${sess.start_time.slice(0,5)} · ${minsLabel(sess.duration_minutes)}</div>
        <div class="title-line">${items.length? items.join(', ') : (sess.notes ? sess.notes.slice(0,40) : '(sans titre)')}</div>`;
      block.onclick = (e)=>{ e.stopPropagation(); openSessionModal(sess); };
      body.appendChild(block);
    });

    col.appendChild(body);
    container.appendChild(col);
  });
}

/* ---------- navigation ---------- */
document.querySelectorAll('#view-seg button').forEach(btn=>{
  btn.onclick = ()=>{ state.view = btn.dataset.view; setActiveViewButton(); reload(); };
});
function setActiveViewButton(){
  document.querySelectorAll('#view-seg button').forEach(b=>b.classList.toggle('active', b.dataset.view===state.view));
}
document.getElementById('nav-prev').onclick = ()=> navigate(-1);
document.getElementById('nav-next').onclick = ()=> navigate(1);
document.getElementById('nav-today').onclick = ()=>{ state.anchor = new Date(); reload(); };
function navigate(dir){
  if(state.view==='month') state.anchor = addMonths(state.anchor, dir);
  else if(state.view==='week') state.anchor = addDays(state.anchor, dir*7);
  else state.anchor = addDays(state.anchor, dir);
  reload();
}
document.querySelectorAll('.chip[data-cat]').forEach(chip=>{
  chip.onclick = ()=>{
    state.catFilter = chip.dataset.cat;
    document.querySelectorAll('.chip[data-cat]').forEach(c=>c.classList.remove('active-all','active-irish','active-jazz'));
    chip.classList.add(chip.dataset.cat==='all' ? 'active-all' : 'active-'+chip.dataset.cat);
    renderAll();
  };
});

/* ---------- session modal ---------- */
const sessionOverlay = document.getElementById('session-overlay');
let editingSessionId = null;

function openSessionModal(sess, day, hour, minute){
  editingSessionId = sess ? sess.id : null;
  document.getElementById('session-modal-title').textContent = sess ? 'Modifier la séance' : 'Nouvelle séance';
  document.getElementById('s-delete').style.display = sess ? 'inline-flex' : 'none';
  document.getElementById('s-toggle-done').style.display = sess ? 'inline-flex' : 'none';
  document.getElementById('s-toggle-done').textContent = sess && sess.done ? 'Marquer non fait' : 'Marquer comme fait';

  const d = sess ? new Date(sess.session_date+'T00:00:00') : (day||new Date());
  document.getElementById('s-date').value = iso(d);
  document.getElementById('s-time').value = sess ? sess.start_time.slice(0,5) : `${String(hour??9).padStart(2,'0')}:${String(minute??0).padStart(2,'0')}`;
  document.getElementById('s-duration').value = sess ? sess.duration_minutes : 30;
  document.getElementById('s-category').value = sess ? sess.category : 'irish';
  document.getElementById('s-notes').value = sess ? (sess.notes||'') : '';

  renderItemPicker(sess ? new Set((sess.items||[]).map(it=>it.id)) : new Set());
  sessionOverlay.classList.add('open');
}

function renderItemPicker(selectedIds){
  const cat = document.getElementById('s-category').value;
  const wrap = document.getElementById('s-items');
  const list = state.items.filter(it => cat==='mixte' || it.category===cat);
  if(list.length===0){
    wrap.innerHTML = '<div class="empty-note">Aucun élément dans cette catégorie. Ajoute-en depuis la Bibliothèque.</div>';
    renderSessionResources();
    return;
  }
  wrap.innerHTML = list.map(it=>`
    <label>
      <input type="checkbox" value="${it.id}" ${selectedIds.has(it.id)?'checked':''}>
      ${escapeHtml(it.title)}
      ${it.resource_path ? '<span title="Supports disponibles">📂</span>' : ''}
      <span class="badge">${TYPE_LABEL[it.type]}</span>
    </label>`).join('');
  wrap.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change', renderSessionResources);
  });
  renderSessionResources();
}

function renderSessionResources(){
  const checkedIds = Array.from(document.querySelectorAll('#s-items input:checked')).map(i=>i.value);
  const withResources = checkedIds
    .map(id => state.items.find(it=>it.id===id))
    .filter(it => it && it.resource_path);
  const wrapEl = document.getElementById('s-resources-wrap');
  const el = document.getElementById('s-resources');
  if(withResources.length===0){ wrapEl.style.display='none'; el.innerHTML=''; return; }
  wrapEl.style.display='block';
  el.innerHTML = withResources.map(it => looksLikeUrl(it.resource_path)
    ? `<a class="res-btn" href="${escapeHtml(it.resource_path)}" target="_blank" rel="noopener">📂 ${escapeHtml(it.title)}</a>`
    : `<button type="button" class="res-btn" data-copy="${escapeHtml(it.resource_path)}">📂 ${escapeHtml(it.title)}</button>`
  ).join('');
  el.querySelectorAll('[data-copy]').forEach(btn=>{
    btn.onclick = async ()=>{
      try{
        await navigator.clipboard.writeText(btn.dataset.copy);
        const original = btn.textContent;
        btn.textContent = '✓ Copié';
        setTimeout(()=>{ btn.textContent = original; }, 1200);
      } catch(err){ alert('Chemin : '+btn.dataset.copy); }
    };
  });
}
document.getElementById('s-category').addEventListener('change', ()=>renderItemPicker(new Set()));

document.getElementById('s-cancel').onclick = ()=> sessionOverlay.classList.remove('open');
sessionOverlay.addEventListener('click', (e)=>{ if(e.target===sessionOverlay) sessionOverlay.classList.remove('open'); });

document.getElementById('s-save').onclick = async ()=>{
  const payload = {
    session_date: document.getElementById('s-date').value,
    start_time: document.getElementById('s-time').value,
    duration_minutes: parseInt(document.getElementById('s-duration').value,10),
    category: document.getElementById('s-category').value,
    notes: document.getElementById('s-notes').value || null,
    item_ids: Array.from(document.querySelectorAll('#s-items input:checked')).map(i=>i.value),
  };
  try{
    if(editingSessionId){
      await api('/api/sessions', {method:'PUT', body: JSON.stringify({id: editingSessionId, ...payload})});
    } else {
      await api('/api/sessions', {method:'POST', body: JSON.stringify(payload)});
    }
  } catch(e){ return alert('Erreur: '+e.message); }
  sessionOverlay.classList.remove('open');
  reload();
};

document.getElementById('s-delete').onclick = async ()=>{
  if(!editingSessionId) return;
  if(!confirm('Supprimer cette séance ?')) return;
  try{
    await api('/api/sessions?id='+encodeURIComponent(editingSessionId), {method:'DELETE'});
  } catch(e){ return alert('Erreur: '+e.message); }
  sessionOverlay.classList.remove('open');
  reload();
};

document.getElementById('s-toggle-done').onclick = async ()=>{
  if(!editingSessionId) return;
  const sess = state.sessions.find(s=>s.id===editingSessionId);
  const newDone = !sess.done;
  try{
    await api('/api/sessions', {method:'PUT', body: JSON.stringify({id: editingSessionId, done: newDone})});
  } catch(e){ return alert('Erreur: '+e.message); }
  sessionOverlay.classList.remove('open');
  reload();
};

document.getElementById('btn-new-session').onclick = ()=> openSessionModal(null, state.anchor, 9, 0);

/* ---------- library modal ---------- */
const libraryModal = document.getElementById('library-modal');
document.getElementById('btn-library').onclick = ()=>{ resetLibraryForm(); renderLibraryList(); libraryModal.classList.add('open'); };
document.getElementById('li-cancel-close').onclick = ()=>{ libraryModal.classList.remove('open'); reload(); };
libraryModal.addEventListener('click', (e)=>{ if(e.target===libraryModal){ libraryModal.classList.remove('open'); reload(); } });

document.querySelectorAll('.chip[data-libcat]').forEach(chip=>{
  chip.onclick = ()=>{
    state.libCat = chip.dataset.libcat;
    document.querySelectorAll('.chip[data-libcat]').forEach(c=>c.classList.remove('active-irish','active-jazz'));
    chip.classList.add('active-'+chip.dataset.libcat);
    resetLibraryForm();
    renderLibraryList();
  };
});

let editingItemId = null;

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function looksLikeUrl(s){
  return /^https?:\/\//i.test(s);
}

function renderLibraryList(){
  const list = document.getElementById('lib-list');
  const items = state.items.filter(it=>it.category===state.libCat);
  if(items.length===0){ list.innerHTML = '<div class="empty-note">Aucun élément pour le moment.</div>'; return; }
  list.innerHTML = items.map(it=>`
    <div class="lib-row" data-id="${it.id}">
      <div style="flex:1;min-width:0;cursor:pointer;" data-edit="${it.id}">
        <div class="ttl">${escapeHtml(it.title)}</div>
        <div class="meta">${TYPE_LABEL[it.type]}</div>
      </div>
      <div class="status">${STATUS_LABEL[it.status]}</div>
      ${it.resource_path ? (
        looksLikeUrl(it.resource_path)
          ? `<a class="res-btn" href="${escapeHtml(it.resource_path)}" target="_blank" rel="noopener">📂 Ouvrir</a>`
          : `<button class="res-btn" data-copy="${escapeHtml(it.resource_path)}">📂 Copier le chemin</button>`
      ) : ''}
      <button class="icon-btn" data-edit-btn="${it.id}">✎</button>
      <button class="icon-btn del" data-del="${it.id}">🗑</button>
    </div>`).join('');

  list.querySelectorAll('[data-del]').forEach(btn=>{
    btn.onclick = async (e)=>{
      e.stopPropagation();
      if(!confirm('Supprimer cet élément de la bibliothèque ?')) return;
      try{
        await api('/api/items?id='+encodeURIComponent(btn.dataset.del), {method:'DELETE'});
      } catch(e){ return alert('Erreur: '+e.message); }
      if(editingItemId === btn.dataset.del) resetLibraryForm();
      await fetchItems();
      renderLibraryList();
    };
  });

  list.querySelectorAll('[data-copy]').forEach(btn=>{
    btn.onclick = async (e)=>{
      e.stopPropagation();
      try{
        await navigator.clipboard.writeText(btn.dataset.copy);
        const original = btn.textContent;
        btn.textContent = '✓ Copié';
        setTimeout(()=>{ btn.textContent = original; }, 1200);
      } catch(err){ alert('Chemin : '+btn.dataset.copy); }
    };
  });

  list.querySelectorAll('[data-edit], [data-edit-btn]').forEach(el=>{
    el.onclick = ()=>{
      const id = el.dataset.edit || el.dataset.editBtn;
      loadItemIntoForm(id);
    };
  });
}

function loadItemIntoForm(id){
  const it = state.items.find(i=>i.id===id);
  if(!it) return;
  editingItemId = id;
  document.getElementById('li-id').value = id;
  document.getElementById('li-title').value = it.title;
  document.getElementById('li-type').value = it.type;
  document.getElementById('li-status').value = it.status;
  document.getElementById('li-desc').value = it.description || '';
  document.getElementById('li-resource').value = it.resource_path || '';
  document.getElementById('li-form-title').textContent = 'Modifier l\'élément';
  document.getElementById('li-add').textContent = 'Enregistrer les modifications';
  document.getElementById('li-edit-cancel').style.display = 'inline-flex';
}

function resetLibraryForm(){
  editingItemId = null;
  document.getElementById('li-id').value = '';
  document.getElementById('li-title').value = '';
  document.getElementById('li-desc').value = '';
  document.getElementById('li-resource').value = '';
  document.getElementById('li-type').value = 'morceau';
  document.getElementById('li-status').value = 'a_travailler';
  document.getElementById('li-form-title').textContent = 'Ajouter un élément';
  document.getElementById('li-add').textContent = 'Ajouter';
  document.getElementById('li-edit-cancel').style.display = 'none';
}

document.getElementById('li-edit-cancel').onclick = resetLibraryForm;

document.getElementById('li-add').onclick = async ()=>{
  const title = document.getElementById('li-title').value.trim();
  if(!title) return alert('Indique un titre.');
  const payload = {
    title,
    category: state.libCat,
    type: document.getElementById('li-type').value,
    status: document.getElementById('li-status').value,
    description: document.getElementById('li-desc').value || null,
    resource_path: document.getElementById('li-resource').value.trim() || null,
  };
  try{
    if(editingItemId){
      await api('/api/items', {method:'PUT', body: JSON.stringify({id: editingItemId, ...payload})});
    } else {
      await api('/api/items', {method:'POST', body: JSON.stringify(payload)});
    }
  } catch(e){ return alert('Erreur: '+e.message); }
  resetLibraryForm();
  await fetchItems();
  renderLibraryList();
};

/* ---------- init ---------- */
reload();
</script>
</body>
</html>
